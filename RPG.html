<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A free random password generator. Generate strong, secure passwords with custom length and character options.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
     <script>
    tailwind.config = {
      darkMode: 'media'
    }
  </script>
    <title>Random Password Generator</title>
</head>
<body class=" bg-white dark:bg-gray-900">
    <div class="border p-5 rounded-xl bg-slate-100 dark:bg-gray-800 text-black dark:text-white my-5 flex flex-col font-bold text-lg border border-gray-300 dark:border-gray-700">
        <h1 class="text-3xl font-bold text-center my-4">Random Password Generator</h1>
    </div>
    <div class="border p-5 rounded-xl bg-slate-100 dark:bg-gray-800 text-black dark:text-white my-5 font-bold text-lg border border-gray-300 dark:border-gray-700">
        <div>
            <label for="length" class="mx-3 px-2 text-black dark:text-white">Password Length:</label>
            <input type="number" id="length" min="4" max="32" class="border p-2 m-3 rounded-full w-64 text-black"><br>
        </div>
        <div class="flex items-center justify-between gap-2">
            <label for="includeUppercase" class="mx-3 px-2 text-black dark:text-white">Include Uppercase Letters:</label>
            <input type="checkbox" id="includeUppercase" class="border p-2 m-3 rounded-full w-64 text-black w-4 h-4 cursor-pointer flex items-center gap-2">
        </div>
        <div class="flex items-center justify-between gap-2">
            <label for="includeLowercase" class="mx-3 px-2 text-black dark:text-white">Include Lowercase Letters:</label>
            <input type="checkbox" id="includeLowercase" checked class="border p-2 m-3 rounded-full w-64 text-black w-4 h-4 cursor-pointer flex items-center gap-2">
        </div>
        <div class="flex items-center justify-between gap-2">
            <label for="includeNumbers" class="mx-3 px-2 text-black dark:text-white">Include Numbers:</label>
            <input type="checkbox" id="includeNumbers" class="border p-2 m-3 rounded-full w-64 text-black w-4 h-4 cursor-pointer flex items-center gap-2">
        </div>
        <div class="flex items-center justify-between gap-2">
            <label for="includeSymbols" class="mx-3 px-2 text-black dark:text-white">Include Symbols:</label>
            <input type="checkbox" id="includeSymbols" class="border p-2 m-3 rounded-full w-64 text-black w-4 h-4 cursor-pointer flex items-center gap-2">
        </div>
        <p class="mx-3 px-2 text-red-500">Please note that passwords can be set between 4-32 characters long.</p>
        <div class="flex justify-center my-5">
            <button aria-label="Generate" id="generatePass" class="bg-blue-500 hover:bg-blue-700 text-white font-bold m-5 py-3 px-4 rounded-full text-center w-64">Generate Password</button>
            <button aria-label="Retry" id="retry" class="bg-red-500 hover:bg-red-700 text-white font-bold m-3 py-2 px-2 rounded-full text-center w-40">Retry</button>
        </div>
    </div>
    <div class="border p-5 rounded-xl bg-slate-100 dark:bg-gray-800 text-black dark:text-white my-5 font-bold text-lg border border-gray-300 dark:border-gray-700">
        <p>Your Generated Password:</p>
        <div class="flex items-center justify-between gap-2 mx-3 px-2">
            <p id="password" class="mx-3 px-2 text-black dark:text-white">------------</p>
            <i class="fa-regular fa-copy" onclick="copyPassword()" class="text-black dark:text-white cursor-pointer flex items-center gap-2"></i>
            <div id="toast" class="hidden fixed bottom-5 right-5 bg-green-500 text-white px-4 py-2 rounded-xl font-bold">Password Copied! ✅</div>
        </div>
        <p id="passwordStrength" class="mx-3 px-2 text-black dark:text-white"></p>
    </div>
    <footer class="border p-5 rounded-lg bg-slate-100 dark:bg-gray-800 text-black dark:text-white my-5 flex flex-col font-bold text-sm border border-gray-300 dark:border-gray-700">
        <p> Made by Sadman, &copy; 2026</p>
        <p>All rights reserved.</p>
        <p>Contact: sadmanahon9@gmail.com</p>
    </footer>
    <script src="RPG.js"></script>
</body>
</html>
